<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
  <defs>
    <style>
      .bg{fill:#fafaf7}
      .title{fill:#1f1f1f;font-weight:600}
      .sub{fill:#6b6659}
      .lane-a{fill:#fff5ea;stroke:#e8b98b;stroke-width:1.2}
      .lane-b{fill:#eef5ec;stroke:#94c39a;stroke-width:1.2}
      .box{fill:#ffffff;stroke:#c8c2b1;stroke-width:1}
      .box-hot{fill:#fff3f0;stroke:#c76b5e;stroke-width:1.4}
      .box-cold{fill:#eef3f8;stroke:#5b7db1;stroke-width:1.2}
      .arrow{stroke:#6b6659;stroke-width:1.4;fill:none}
      .arrow-slow{stroke:#c76b5e;stroke-width:1.6;fill:none}
      .arrow-fast{stroke:#6a9955;stroke-width:1.6;fill:none}
      .t-sm{font-size:11px;fill:#2a2a2a}
      .t-md{font-size:13px;fill:#2a2a2a}
      .t-lg{font-size:15px;fill:#2a2a2a;font-weight:600}
      .t-mute{fill:#7a7466}
      .t-red{fill:#c76b5e}
      .t-green{fill:#4f8a5a}
      .t-blue{fill:#4a6a95}
      .label{fill:#1f1f1f;font-weight:600;font-size:14px}
    </style>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#6b6659"/>
    </marker>
    <marker id="arrRed" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#c76b5e"/>
    </marker>
    <marker id="arrGreen" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#6a9955"/>
    </marker>
  </defs>

  <rect class="bg" width="1200" height="620"/>

  <text x="40" y="42" class="title" font-size="20">pin_memory 到底省了哪一次拷贝</text>
  <text x="40" y="64" class="sub" font-size="12">pageable（默认） vs pinned（页锁定） · 从 SSD 到 GPU 显存的完整路径</text>

  <!-- Lane A: Pageable -->
  <rect x="30" y="90" width="1140" height="210" rx="8" class="lane-a"/>
  <text x="48" y="118" class="label t-red">A · pageable（默认 · 多一次 CPU→CPU 拷贝）</text>

  <!-- Stage boxes lane A -->
  <rect x="50" y="140" width="160" height="110" rx="6" class="box"/>
  <text x="130" y="170" class="t-md" text-anchor="middle" font-weight="600">SSD / NVMe</text>
  <text x="130" y="190" class="t-sm t-mute" text-anchor="middle">磁盘块设备</text>
  <text x="130" y="212" class="t-sm t-blue" text-anchor="middle">DMA → 内核 Page</text>
  <text x="130" y="228" class="t-sm t-mute" text-anchor="middle">Cache</text>

  <rect x="260" y="140" width="160" height="110" rx="6" class="box"/>
  <text x="340" y="170" class="t-md" text-anchor="middle" font-weight="600">Page Cache</text>
  <text x="340" y="190" class="t-sm t-mute" text-anchor="middle">内核态可换出页</text>
  <text x="340" y="212" class="t-sm t-mute" text-anchor="middle">由 OS 管理</text>

  <rect x="470" y="140" width="180" height="110" rx="6" class="box-hot"/>
  <text x="560" y="170" class="t-md" text-anchor="middle" font-weight="600">pageable buf</text>
  <text x="560" y="190" class="t-sm t-mute" text-anchor="middle">用户态可换出页</text>
  <text x="560" y="212" class="t-sm t-red" text-anchor="middle">tensor 驻留此处</text>
  <text x="560" y="230" class="t-sm t-mute" text-anchor="middle">（可能被 swap）</text>

  <rect x="700" y="140" width="180" height="110" rx="6" class="box-cold"/>
  <text x="790" y="170" class="t-md" text-anchor="middle" font-weight="600">pinned buf</text>
  <text x="790" y="190" class="t-sm t-mute" text-anchor="middle">内核锁定的页</text>
  <text x="790" y="212" class="t-sm t-blue" text-anchor="middle">DMA 可达</text>
  <text x="790" y="230" class="t-sm t-mute" text-anchor="middle">（.cuda() 触发）</text>

  <rect x="930" y="140" width="200" height="110" rx="6" class="box"/>
  <text x="1030" y="170" class="t-md" text-anchor="middle" font-weight="600">GPU VRAM</text>
  <text x="1030" y="190" class="t-sm t-mute" text-anchor="middle">H100 / A100 HBM</text>
  <text x="1030" y="212" class="t-sm t-green" text-anchor="middle">CUDA kernel 可用</text>

  <!-- arrows A -->
  <path d="M 210 195 L 258 195" class="arrow" marker-end="url(#arr)"/>
  <text x="234" y="186" class="t-sm t-mute" text-anchor="middle">DMA</text>

  <path d="M 420 195 L 468 195" class="arrow" marker-end="url(#arr)"/>
  <text x="444" y="186" class="t-sm t-mute" text-anchor="middle">read</text>

  <path d="M 650 195 L 698 195" class="arrow-slow" marker-end="url(#arrRed)"/>
  <text x="674" y="184" class="t-sm t-red" text-anchor="middle" font-weight="600">+copy</text>

  <path d="M 880 195 L 928 195" class="arrow-fast" marker-end="url(#arrGreen)"/>
  <text x="904" y="184" class="t-sm t-green" text-anchor="middle">DMA</text>

  <!-- footer A -->
  <text x="48" y="282" class="t-sm t-red">总共 4 段 · 其中 pageable→pinned 是「多」出来的一次纯 CPU 内拷贝</text>

  <!-- Lane B: Pinned -->
  <rect x="30" y="320" width="1140" height="200" rx="8" class="lane-b"/>
  <text x="48" y="348" class="label t-green">B · pin_memory=True（直接落在 pinned · 省一次拷贝）</text>

  <rect x="50" y="370" width="160" height="110" rx="6" class="box"/>
  <text x="130" y="400" class="t-md" text-anchor="middle" font-weight="600">SSD / NVMe</text>
  <text x="130" y="420" class="t-sm t-mute" text-anchor="middle">磁盘块设备</text>

  <rect x="260" y="370" width="160" height="110" rx="6" class="box"/>
  <text x="340" y="400" class="t-md" text-anchor="middle" font-weight="600">Page Cache</text>
  <text x="340" y="420" class="t-sm t-mute" text-anchor="middle">内核态页</text>

  <rect x="470" y="370" width="260" height="110" rx="6" class="box-cold"/>
  <text x="600" y="400" class="t-md" text-anchor="middle" font-weight="600">pinned buf（DataLoader）</text>
  <text x="600" y="420" class="t-sm t-mute" text-anchor="middle">pin_memory=True 预分配</text>
  <text x="600" y="440" class="t-sm t-blue" text-anchor="middle">非换出 · DMA 直达</text>
  <text x="600" y="458" class="t-sm t-mute" text-anchor="middle">non_blocking=True 异步</text>

  <rect x="780" y="370" width="200" height="110" rx="6" class="box"/>
  <text x="880" y="400" class="t-md" text-anchor="middle" font-weight="600">GPU VRAM</text>
  <text x="880" y="420" class="t-sm t-mute" text-anchor="middle">H100 / A100 HBM</text>
  <text x="880" y="442" class="t-sm t-green" text-anchor="middle">与计算 overlap</text>

  <path d="M 210 425 L 258 425" class="arrow" marker-end="url(#arr)"/>
  <path d="M 420 425 L 468 425" class="arrow" marker-end="url(#arr)"/>
  <path d="M 730 425 L 778 425" class="arrow-fast" marker-end="url(#arrGreen)"/>
  <text x="754" y="414" class="t-sm t-green" text-anchor="middle" font-weight="600">async</text>
  <text x="754" y="444" class="t-sm t-green" text-anchor="middle">DMA</text>

  <text x="48" y="506" class="t-sm t-green">3 段 · pageable→pinned 被省掉 · non_blocking 让拷贝与前向算子并行</text>

  <!-- Takeaway box -->
  <rect x="30" y="540" width="1140" height="60" rx="6" fill="#f2efe6" stroke="#d9d4c3"/>
  <text x="48" y="565" class="t-md" font-weight="600">TL;DR</text>
  <text x="48" y="586" class="t-sm t-mute">pin_memory 省的是 CPU→CPU 的一次拷贝 · 仅在 GPU 吃不饱（利用率&lt;80%）时有肉眼收益 · 代价是占住不可换出内存</text>
</svg>
