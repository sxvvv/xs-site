<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
  <defs>
    <style>
      .bg{fill:#fafaf7}
      .title{fill:#1f1f1f;font-weight:600}
      .sub{fill:#6b6659}
      .lane{fill:#ffffff;stroke:#b8b39e;stroke-width:1}
      .lane-r{fill:#eef3f8;stroke:#5b7db1;stroke-width:1}
      .lane-w{fill:#fff5ea;stroke:#d4a070;stroke-width:1}
      .lane-n{fill:#eef5ec;stroke:#7eb485;stroke-width:1}
      .t-sm{font-size:11px;fill:#2a2a2a}
      .t-md{font-size:13px;fill:#2a2a2a}
      .t-lg{font-size:15px;fill:#2a2a2a;font-weight:600}
      .t-mute{fill:#7a7466}
      .t-code{font-size:11px;fill:#5b6b7d}
      .bar-r{fill:#5b7db1;opacity:0.85}
      .bar-w{fill:#d4a070;opacity:0.85}
      .bar-n{fill:#7eb485;opacity:0.85}
      .bar-free{fill:#c76b5e;opacity:0.85}
      .boundary{stroke:#c76b5e;stroke-width:1.5;stroke-dasharray:4,3;fill:none}
      .event-label{fill:#1f1f1f;font-weight:600;font-size:12px}
      .grace-fill{fill:#ffe5c2;opacity:0.35}
    </style>
    <marker id="a07" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#7a7466"/>
    </marker>
  </defs>

  <rect class="bg" width="1200" height="620"/>

  <text x="40" y="40" class="title" font-size="20">RCU · 为什么读多写少场景它能做到读侧零开销</text>
  <text x="40" y="62" class="sub" font-size="12">三条泳道 · 老 reader 不被打扰 · 新 reader 看到新版 · 老版本在 grace period 后才回收</text>

  <!-- grace period background band -->
  <rect x="380" y="100" width="440" height="380" class="grace-fill"/>
  <text x="600" y="94" class="event-label" text-anchor="middle" fill="#a06830">grace period</text>

  <!-- timeline axis labels (top) -->
  <g stroke="#7a7466" stroke-width="0.8" stroke-dasharray="2,3">
    <line x1="220" y1="100" x2="220" y2="490"/>
    <line x1="380" y1="100" x2="380" y2="490"/>
    <line x1="820" y1="100" x2="820" y2="490"/>
    <line x1="980" y1="100" x2="980" y2="490"/>
  </g>
  <text x="220" y="512" class="t-code" text-anchor="middle">t₀</text>
  <text x="380" y="512" class="t-code" text-anchor="middle" font-weight="600" fill="#a06830">t₁ · 发布新版</text>
  <text x="820" y="512" class="t-code" text-anchor="middle" font-weight="600" fill="#a06830">t₂ · 全员过静止态</text>
  <text x="980" y="512" class="t-code" text-anchor="middle">t₃ · 回收老版</text>

  <!-- Lane 1: old readers -->
  <rect x="60" y="110" width="1100" height="100" rx="6" class="lane-r"/>
  <text x="78" y="134" class="t-lg" fill="#2a4a7a">① 老 reader</text>
  <text x="78" y="152" class="t-code">rcu_read_lock · 看到旧指针 · 不需要等任何锁</text>

  <!-- reader execution bars -->
  <rect x="220" y="168" width="360" height="24" rx="3" class="bar-r"/>
  <text x="400" y="184" class="t-sm" text-anchor="middle" fill="#ffffff" font-weight="600">读旧版数据（正在 traversal）</text>
  <rect x="600" y="168" width="100" height="24" rx="3" class="bar-r" opacity="0.4"/>
  <text x="650" y="184" class="t-sm" text-anchor="middle" fill="#1f3a6b">rcu_read_unlock</text>

  <!-- Lane 2: updater -->
  <rect x="60" y="230" width="1100" height="100" rx="6" class="lane-w"/>
  <text x="78" y="254" class="t-lg" fill="#8a5a2a">② updater</text>
  <text x="78" y="272" class="t-code">准备新版 → rcu_assign_pointer → synchronize_rcu（等 grace period）→ free 老版</text>

  <!-- updater bars -->
  <rect x="260" y="288" width="100" height="24" rx="3" fill="#d4a070" opacity="0.5"/>
  <text x="310" y="305" class="t-sm" text-anchor="middle">copy + modify</text>
  <rect x="370" y="288" width="30" height="24" rx="2" class="bar-w"/>
  <text x="385" y="326" class="t-code" text-anchor="middle" fill="#a06830">assign</text>
  <rect x="405" y="288" width="410" height="24" rx="3" fill="#d4a070" opacity="0.35"/>
  <text x="610" y="305" class="t-sm" text-anchor="middle" fill="#5a3818" font-weight="600">synchronize_rcu · 阻塞等待</text>
  <rect x="820" y="288" width="150" height="24" rx="3" class="bar-free"/>
  <text x="895" y="305" class="t-sm" text-anchor="middle" fill="#ffffff" font-weight="600">kfree(old)</text>

  <!-- Lane 3: new readers -->
  <rect x="60" y="350" width="1100" height="100" rx="6" class="lane-n"/>
  <text x="78" y="374" class="t-lg" fill="#3a6a45">③ 新 reader</text>
  <text x="78" y="392" class="t-code">t₁ 之后进入 · rcu_read_lock 看到的已经是新指针</text>

  <rect x="410" y="408" width="560" height="24" rx="3" class="bar-n"/>
  <text x="690" y="424" class="t-sm" text-anchor="middle" fill="#ffffff" font-weight="600">读新版数据 · 与 updater 并行</text>

  <!-- Boundary lines (vertical) with labels -->
  <line x1="380" y1="100" x2="380" y2="490" class="boundary"/>
  <line x1="820" y1="100" x2="820" y2="490" class="boundary"/>

  <!-- Right side: key properties -->
  <rect x="60" y="510" width="540" height="98" rx="6" fill="#f2efe6" stroke="#d9d4c3"/>
  <text x="78" y="534" class="t-md" font-weight="600">RCU 核心假设</text>
  <line x1="78" y1="542" x2="584" y2="542" stroke="#d9d4c3"/>
  <text x="78" y="562" class="t-code">1. reader 进入和离开 critical section 都是 preemption 翻页</text>
  <text x="78" y="578" class="t-code">2. 所有 CPU 至少经过一次调度 · 老 reader 必定已离开</text>
  <text x="78" y="594" class="t-code">3. 此时回收老版本 · 100% 安全 · 无锁无原子</text>

  <rect x="620" y="510" width="540" height="98" rx="6" fill="#fff9ee" stroke="#e0c585"/>
  <text x="638" y="534" class="t-md" font-weight="600">和读写锁 · 原子的对比</text>
  <line x1="638" y1="542" x2="1144" y2="542" stroke="#e0c585"/>
  <text x="638" y="562" class="t-code">读写锁：reader 也要 CAS → cache line 弹跳</text>
  <text x="638" y="578" class="t-code">RCU：reader 只是开关 preemption → 零原子操作</text>
  <text x="638" y="594" class="t-code" fill="#c76b5e" font-weight="600">代价 · updater 侧要等一个 grace period（毫秒级）</text>
</svg>
